<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHANTOM HAND</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #title-block {
      position: absolute;
      top: 20px;
      left: 24px;
    }

    #title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #00ffff;
      text-shadow: 0 0 12px #00ffff, 0 0 30px rgba(0,255,255,0.4);
    }

    #subtitle {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,255,0.45);
      margin-top: 4px;
      text-transform: uppercase;
    }

    #status-block {
      position: absolute;
      top: 74px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff2244;
      box-shadow: 0 0 8px #ff2244;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #status-dot.active {
      background: #00ff88;
      box-shadow: 0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.4);
    }

    #status-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    #stats-block {
      position: absolute;
      bottom: 20px;
      right: 24px;
      text-align: right;
    }

    .stat-line {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0,255,255,0.4);
      line-height: 1.8;
      text-transform: uppercase;
    }

    .stat-val {
      color: rgba(0,255,255,0.75);
    }

    /* Camera preview */
    #camera-preview {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 200px;
      height: 150px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0,255,255,0.25);
      box-shadow: 0 0 16px rgba(0,255,255,0.15), inset 0 0 8px rgba(0,0,0,0.6);
      z-index: 20;
    }

    #webcam {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.85;
    }

    #landmark-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    #cam-label {
      position: absolute;
      bottom: 7px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      background: rgba(0,0,0,0.4);
      padding: 3px 0;
      z-index: 2;
    }

    #cam-label.active { color: rgba(0,255,136,0.8); }

    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(0,255,255,0.3);
      border-style: solid;
      z-index: 3;
    }
    .corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<div id="hud">
  <div id="title-block">
    <div id="title">PHANTOM HAND</div>
    <div id="subtitle">Landmark Primitives &middot; Floating Physics</div>
  </div>
  <div id="status-block">
    <div id="status-dot"></div>
    <div id="status-text">NO HAND DETECTED</div>
  </div>
  <div id="stats-block">
    <div class="stat-line">OBJECTS <span class="stat-val" id="obj-count">--</span></div>
    <div class="stat-line">FPS <span class="stat-val" id="fps-display">--</span></div>
  </div>
</div>

<div id="camera-preview">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="landmark-canvas"></canvas>
  <div id="cam-label">NO HAND DETECTED</div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ================================================================
//  PHANTOM HAND — Three.js landmark primitives + floating physics
// ================================================================

// ── MediaPipe hand skeleton connections ──────────────────────────
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],          // thumb
  [0,5],[5,6],[6,7],[7,8],          // index
  [0,9],[9,10],[10,11],[11,12],     // middle
  [0,13],[13,14],[14,15],[15,16],   // ring
  [0,17],[17,18],[18,19],[19,20],   // pinky
  [5,9],[9,13],[13,17]              // palm cross
];

// Emissive colors per finger (as hex numbers for Three.js)
const FINGER_COLORS = {
  wrist:  0xffffff,
  thumb:  0xff6600,
  index:  0x00ffff,
  middle: 0xff00ff,
  ring:   0xffff00,
  pinky:  0x00ff88,
};

function fingerForLandmark(i) {
  if (i === 0)               return 'wrist';
  if (i >= 1  && i <= 4)    return 'thumb';
  if (i >= 5  && i <= 8)    return 'index';
  if (i >= 9  && i <= 12)   return 'middle';
  if (i >= 13 && i <= 16)   return 'ring';
  return 'pinky';
}

// ── Utility ──────────────────────────────────────────────────────
const rand   = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 0.999));

function randomOnSphere(r) {
  const theta = 2 * Math.PI * Math.random();
  const phi   = Math.acos(2 * Math.random() - 1);
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}

// ================================================================
//  THREE.JS SETUP
// ================================================================

const canvas   = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);

const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x000000, 0.035);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

// ── Lighting ─────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111111, 1.0));

[
  { color: 0x00ffff, pos: [ 4,  3,  2], i: 2.5 },
  { color: 0xff00ff, pos: [-4,  2,  2], i: 2.0 },
  { color: 0x0033ff, pos: [ 0, -4,  1], i: 1.8 },
  { color: 0xff6600, pos: [ 2, -2, -2], i: 1.5 },
].forEach(({ color, pos, i }) => {
  const pl = new THREE.PointLight(color, i, 20);
  pl.position.set(...pos);
  scene.add(pl);
});

// ── Starfield ────────────────────────────────────────────────────
(function() {
  const N   = 700;
  const buf = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const p = randomOnSphere(rand(9, 15));
    buf[i * 3] = p.x; buf[i * 3 + 1] = p.y; buf[i * 3 + 2] = p.z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
  scene.add(new THREE.Points(geo,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.025, transparent: true, opacity: 0.45 })
  ));
})();

// ================================================================
//  HAND LANDMARK MESHES
// ================================================================

const jointGroup = new THREE.Group();
const lineGroup  = new THREE.Group();
scene.add(jointGroup);
scene.add(lineGroup);

// 21 icosahedron joints
const jointMeshes = Array.from({ length: 21 }, (_, i) => {
  const color = FINGER_COLORS[fingerForLandmark(i)];
  const mat   = new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: 0.9,
    metalness: 0.4,
    roughness: 0.3,
  });
  const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.06, 1), mat);
  mesh.visible = false;
  jointGroup.add(mesh);
  return mesh;
});

// Connection lines
const connectionLines = HAND_CONNECTIONS.map(([a, b]) => {
  const pts = [new THREE.Vector3(), new THREE.Vector3()];
  const geo  = new THREE.BufferGeometry().setFromPoints(pts);
  const color = FINGER_COLORS[fingerForLandmark(a)];
  const mat  = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 });
  const line = new THREE.Line(geo, mat);
  line.visible = false;
  lineGroup.add(line);
  return { line, a, b };
});

// Current 3-D landmark positions
let landmarkPositions = null;

function updateHandMeshes(landmarks) {
  landmarkPositions = landmarks.map(lm => new THREE.Vector3(
    (lm.x - 0.5) * 6,
    -(lm.y - 0.5) * 6,
    -lm.z * 3
  ));
  for (let i = 0; i < 21; i++) {
    jointMeshes[i].position.copy(landmarkPositions[i]);
    jointMeshes[i].visible = true;
  }
  connectionLines.forEach(({ line, a, b }) => {
    const pos = line.geometry.attributes.position;
    const pa = landmarkPositions[a], pb = landmarkPositions[b];
    pos.setXYZ(0, pa.x, pa.y, pa.z);
    pos.setXYZ(1, pb.x, pb.y, pb.z);
    pos.needsUpdate = true;
    line.visible = true;
  });
}

function hideHandMeshes() {
  jointMeshes.forEach(m => { m.visible = false; });
  connectionLines.forEach(({ line }) => { line.visible = false; });
  landmarkPositions = null;
}

// ================================================================
//  FLOATING OBJECTS
// ================================================================

const GEO_POOL = [
  new THREE.BoxGeometry(0.2, 0.2, 0.2),
  new THREE.TetrahedronGeometry(0.15),
  new THREE.OctahedronGeometry(0.15),
  new THREE.DodecahedronGeometry(0.12),
  new THREE.TorusGeometry(0.12, 0.04, 8, 16),
  new THREE.IcosahedronGeometry(0.13, 0),
];

const FLOAT_COUNT   = 35;
const floatGroup    = new THREE.Group();
const floatObjects  = [];
scene.add(floatGroup);

function makeObject() {
  const geo   = GEO_POOL[randInt(0, GEO_POOL.length - 1)];
  const color = new THREE.Color().setHSL(Math.random(), 0.55, 0.55);
  const mat   = new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: 0.15,
    metalness: 0.8,
    roughness: 0.3,
  });
  const mesh = new THREE.Mesh(geo, mat);
  const pos  = randomOnSphere(rand(2.5, 5.0));
  mesh.position.copy(pos);
  floatGroup.add(mesh);

  const inward = pos.clone().negate().normalize().multiplyScalar(rand(0.02, 0.08));
  const jitter = new THREE.Vector3(rand(-0.05, 0.05), rand(-0.05, 0.05), rand(-0.05, 0.05));

  return {
    mesh,
    velocity:        inward.add(jitter),
    angularVelocity: new THREE.Vector3(rand(-0.6, 0.6), rand(-0.6, 0.6), rand(-0.6, 0.6)),
    age:    0,
    maxAge: rand(15, 40),
    needsRespawn: false,
  };
}

function respawnObject(obj) {
  const pos = randomOnSphere(rand(4.5, 5.5));
  obj.mesh.position.copy(pos);
  const inward = pos.clone().negate().normalize().multiplyScalar(rand(0.02, 0.07));
  const jitter = new THREE.Vector3(rand(-0.04, 0.04), rand(-0.04, 0.04), rand(-0.04, 0.04));
  obj.velocity.copy(inward.add(jitter));
  obj.angularVelocity.set(rand(-0.6, 0.6), rand(-0.6, 0.6), rand(-0.6, 0.6));
  obj.age          = 0;
  obj.maxAge       = rand(15, 40);
  obj.needsRespawn = false;
  obj.mesh.material.emissiveIntensity = 0.15;
}

for (let i = 0; i < FLOAT_COUNT; i++) floatObjects.push(makeObject());

// Scratch vectors (avoid per-frame allocation)
const _push    = new THREE.Vector3();
const _wristP  = new THREE.Vector3();
const COLL_R   = 0.25;
const PUSH_STR = 0.15;
const GRAV_STR = 0.003;

function tickFloating(dt) {
  const hasHand = landmarkPositions !== null;
  if (hasHand) _wristP.copy(landmarkPositions[0]);

  floatObjects.forEach(obj => {
    obj.age += dt;

    // Gravitate toward wrist
    if (hasHand) {
      _push.copy(_wristP).sub(obj.mesh.position).normalize();
      obj.velocity.addScaledVector(_push, GRAV_STR);
    }

    // Integrate position
    obj.mesh.position.addScaledVector(obj.velocity, dt);

    // Tumble
    obj.mesh.rotation.x += obj.angularVelocity.x * dt;
    obj.mesh.rotation.y += obj.angularVelocity.y * dt;
    obj.mesh.rotation.z += obj.angularVelocity.z * dt;

    // Light drag
    obj.velocity.multiplyScalar(0.998);
    const spd = obj.velocity.length();
    if (spd > 0.5) obj.velocity.multiplyScalar(0.5 / spd);

    // Hand collision
    if (hasHand) {
      landmarkPositions.forEach(lm => {
        const d = obj.mesh.position.distanceTo(lm);
        if (d < COLL_R && d > 0.001) {
          _push.copy(obj.mesh.position).sub(lm).normalize();
          obj.velocity.addScaledVector(_push, PUSH_STR * (COLL_R - d) / COLL_R);
          obj.mesh.material.emissiveIntensity = 1.0;
        }
      });
    }

    // Decay glow
    obj.mesh.material.emissiveIntensity *= 0.9;
    if (obj.mesh.material.emissiveIntensity < 0.15)
      obj.mesh.material.emissiveIntensity = 0.15;

    // Boundary / age → respawn
    if (obj.mesh.position.length() > 7 || obj.age > obj.maxAge)
      obj.needsRespawn = true;

    if (obj.needsRespawn) respawnObject(obj);
  });
}

// ================================================================
//  RENDER LOOP
// ================================================================

const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const camLabel   = document.getElementById('cam-label');
const objCountEl = document.getElementById('obj-count');
const fpsEl      = document.getElementById('fps-display');

let lastTime   = performance.now();
let fpsBuf     = [];
let frame      = 0;
let pulseT     = 0;

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.1);
  lastTime  = now;

  // FPS sampling
  fpsBuf.push(1 / dt);
  if (fpsBuf.length > 30) fpsBuf.shift();
  if (++frame % 15 === 0) {
    fpsEl.textContent      = Math.round(fpsBuf.reduce((a, b) => a + b, 0) / fpsBuf.length);
    objCountEl.textContent = FLOAT_COUNT;
  }

  // Landmark pulse
  pulseT += dt * 2.2;
  const pulse = 0.55 + 0.45 * Math.sin(pulseT);
  if (landmarkPositions) {
    jointMeshes.forEach(m => {
      m.material.emissiveIntensity = pulse;
      m.scale.setScalar(0.88 + 0.12 * pulse);
    });
  }

  // Very slow scene drift
  floatGroup.rotation.y += 0.00035;

  tickFloating(dt);
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================================================================
//  MEDIAPIPE HANDS
// ================================================================

const videoEl  = document.getElementById('webcam');
const lmCanvas = document.getElementById('landmark-canvas');
const lmCtx    = lmCanvas.getContext('2d');

function sizePreviewCanvas() {
  const el = document.getElementById('camera-preview');
  lmCanvas.width  = el.offsetWidth;
  lmCanvas.height = el.offsetHeight;
}
sizePreviewCanvas();
window.addEventListener('resize', sizePreviewCanvas);

let isTracking = false;

function setTracking(active) {
  if (active === isTracking) return;
  isTracking = active;
  statusDot.classList.toggle('active', active);
  const msg = active ? 'HAND TRACKING ACTIVE' : 'NO HAND DETECTED';
  statusText.textContent = msg;
  camLabel.textContent   = msg;
  camLabel.classList.toggle('active', active);
}

function drawPreviewLandmarks(landmarks) {
  lmCtx.clearRect(0, 0, lmCanvas.width, lmCanvas.height);
  if (!landmarks) return;
  const W = lmCanvas.width, H = lmCanvas.height;

  // Connections
  HAND_CONNECTIONS.forEach(([a, b]) => {
    const la = landmarks[a], lb = landmarks[b];
    const hexStr = '#' + FINGER_COLORS[fingerForLandmark(a)].toString(16).padStart(6, '0');
    lmCtx.strokeStyle = hexStr;
    lmCtx.lineWidth   = 1;
    lmCtx.globalAlpha = 0.65;
    lmCtx.beginPath();
    lmCtx.moveTo(la.x * W, la.y * H);
    lmCtx.lineTo(lb.x * W, lb.y * H);
    lmCtx.stroke();
  });

  // Joints
  landmarks.forEach((lm, i) => {
    const hexStr = '#' + FINGER_COLORS[fingerForLandmark(i)].toString(16).padStart(6, '0');
    lmCtx.globalAlpha = 1;
    lmCtx.fillStyle   = hexStr;
    lmCtx.shadowColor = hexStr;
    lmCtx.shadowBlur  = 6;
    lmCtx.beginPath();
    lmCtx.arc(lm.x * W, lm.y * H, i === 0 ? 4 : 3, 0, Math.PI * 2);
    lmCtx.fill();
    lmCtx.shadowBlur = 0;
  });
  lmCtx.globalAlpha = 1;
}

// Init MediaPipe Hands
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence:  0.6,
});
hands.onResults(results => {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    updateHandMeshes(lm);
    drawPreviewLandmarks(lm);
    setTracking(true);
  } else {
    hideHandMeshes();
    drawPreviewLandmarks(null);
    setTracking(false);
  }
});

// Start webcam via MediaPipe Camera
const mpCamera = new Camera(videoEl, {
  onFrame: async () => { await hands.send({ image: videoEl }); },
  width:  640,
  height: 480,
});
mpCamera.start().catch(err => {
  console.warn('Camera error:', err);
  statusText.textContent = 'CAMERA UNAVAILABLE';
});
</script>
</body>
</html>
