<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHANTOM HAND</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #title-block {
      position: absolute;
      top: 20px;
      left: 24px;
    }

    #title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #00ffff;
      text-shadow: 0 0 12px #00ffff, 0 0 30px rgba(0,255,255,0.4);
    }

    #subtitle {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,255,0.45);
      margin-top: 4px;
      text-transform: uppercase;
    }

    #status-block {
      position: absolute;
      top: 74px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff2244;
      box-shadow: 0 0 8px #ff2244;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #status-dot.active {
      background: #00ff88;
      box-shadow: 0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.4);
    }

    #status-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    /* Hand legend */
    #hand-legend {
      position: absolute;
      top: 20px;
      right: 24px;
      text-align: right;
    }

    .hand-label {
      font-size: 11px;
      letter-spacing: 3px;
      line-height: 2;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s, text-shadow 0.3s;
    }

    .hand-label.skull {
      color: #ddddcc;
    }

    .hand-label.pumpkin {
      color: #ff8833;
    }

    .hand-label.active-skull {
      opacity: 1;
      text-shadow: 0 0 10px #ddddcc, 0 0 20px rgba(220,220,200,0.4);
    }

    .hand-label.active-pumpkin {
      opacity: 1;
      text-shadow: 0 0 10px #ff8833, 0 0 20px rgba(255,136,51,0.4);
    }

    #stats-block {
      position: absolute;
      bottom: 20px;
      right: 24px;
      text-align: right;
    }

    .stat-line {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(0,255,255,0.4);
      line-height: 1.8;
      text-transform: uppercase;
    }

    .stat-val {
      color: rgba(0,255,255,0.75);
    }

    /* Camera preview */
    #camera-preview {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 200px;
      height: 150px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0,255,255,0.25);
      box-shadow: 0 0 16px rgba(0,255,255,0.15), inset 0 0 8px rgba(0,0,0,0.6);
      z-index: 20;
    }

    #webcam {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.85;
    }

    #landmark-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    #cam-label {
      position: absolute;
      bottom: 7px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      background: rgba(0,0,0,0.4);
      padding: 3px 0;
      z-index: 2;
    }

    #cam-label.active { color: rgba(0,255,136,0.8); }

    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(0,255,255,0.3);
      border-style: solid;
      z-index: 3;
    }
    .corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<div id="hud">
  <div id="title-block">
    <div id="title">PHANTOM HAND</div>
    <div id="subtitle">Dual-Hand Tracking &middot; Skulls &amp; Pumpkins</div>
  </div>
  <div id="status-block">
    <div id="status-dot"></div>
    <div id="status-text">NO HANDS DETECTED</div>
  </div>
  <div id="hand-legend">
    <div class="hand-label skull" id="left-label">&#9760; LEFT: SKULLS</div>
    <div class="hand-label pumpkin" id="right-label">&#127875; RIGHT: PUMPKINS</div>
  </div>
  <div id="stats-block">
    <div class="stat-line">HANDS <span class="stat-val" id="hand-count">0 / 2</span></div>
    <div class="stat-line">FPS <span class="stat-val" id="fps-display">--</span></div>
  </div>
</div>

<div id="camera-preview">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="landmark-canvas"></canvas>
  <div id="cam-label">NO HANDS DETECTED</div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GLTFLoader for Three.js r128 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ================================================================
//  PHANTOM HAND — Dual-hand tracking, skulls + pumpkins
// ================================================================

// ── MediaPipe hand skeleton connections ──────────────────────────
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],          // thumb
  [0,5],[5,6],[6,7],[7,8],          // index
  [0,9],[9,10],[10,11],[11,12],     // middle
  [0,13],[13,14],[14,15],[15,16],   // ring
  [0,17],[17,18],[18,19],[19,20],   // pinky
  [5,9],[9,13],[13,17]              // palm cross
];

// Line colors per hand
const COLOR_SKULL   = 0xddddcc;  // left hand — pale bone white
const COLOR_PUMPKIN = 0xff8833;  // right hand — warm orange

// Preview canvas colors per hand
const PREVIEW_SKULL   = '#ddddcc';
const PREVIEW_PUMPKIN = '#ff8833';

// Utility
function randomOnSphere(r) {
  const theta = 2 * Math.PI * Math.random();
  const phi   = Math.acos(2 * Math.random() - 1);
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}

// ================================================================
//  THREE.JS SETUP
// ================================================================

const canvas   = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
scene.fog   = new THREE.FogExp2(0x000000, 0.035);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

// ── Static rim lights ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111111, 1.0));

[
  { color: 0x00ffff, pos: [ 4,  3,  2], i: 2.0 },
  { color: 0xff00ff, pos: [-4,  2,  2], i: 1.5 },
  { color: 0x0033ff, pos: [ 0, -4,  1], i: 1.5 },
].forEach(({ color, pos, i }) => {
  const pl = new THREE.PointLight(color, i, 20);
  pl.position.set(...pos);
  scene.add(pl);
});

// ── Dynamic accent lights (respond to hand presence) ─────────────
const skullLight   = new THREE.PointLight(0xbbccff, 0, 15);  // blue-white for skulls
skullLight.position.set(-2, 2, 3);
scene.add(skullLight);

const pumpkinLight = new THREE.PointLight(0xff6600, 0, 15);  // orange for pumpkins
pumpkinLight.position.set(2, -1, 3);
scene.add(pumpkinLight);

// ── Starfield ────────────────────────────────────────────────────
(function() {
  const N   = 700;
  const buf = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const p = randomOnSphere(Math.random() * 6 + 9);
    buf[i * 3] = p.x; buf[i * 3 + 1] = p.y; buf[i * 3 + 2] = p.z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
  scene.add(new THREE.Points(geo,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.025, transparent: true, opacity: 0.45 })
  ));
})();

// ================================================================
//  GLB MODEL LOADING
// ================================================================

let skullTemplate   = null;
let pumpkinTemplate = null;
let modelsReady     = false;

// Fallback geometries (used immediately; swapped out when GLBs load)
function makeFallbackSkull() {
  const geo = new THREE.IcosahedronGeometry(0.18, 1);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xddddcc, emissive: 0xaaaaaa, emissiveIntensity: 0.5,
    metalness: 0.3, roughness: 0.4
  });
  return new THREE.Mesh(geo, mat);
}

function makeFallbackPumpkin() {
  const geo = new THREE.IcosahedronGeometry(0.18, 1);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.5,
    metalness: 0.3, roughness: 0.4
  });
  return new THREE.Mesh(geo, mat);
}

// Pre-create templates with fallback; swap in real GLBs when loaded
skullTemplate   = makeFallbackSkull();
pumpkinTemplate = makeFallbackPumpkin();
modelsReady     = true;

const loader = new THREE.GLTFLoader();

loader.load('./skull.glb', (gltf) => {
  skullTemplate = gltf.scene;
  skullTemplate.scale.setScalar(1.2);
  // Swap existing skull markers for new template clones
  rebuildHandMarkers('Left');
  // Ensure all existing clones have the correct scale
  handData.Left.markers.forEach(m => m.scale.setScalar(1.2));
  console.log('skull.glb loaded');
}, undefined, () => {
  console.warn('skull.glb not found — using fallback icosahedron');
});

loader.load('./pumpkin.glb', (gltf) => {
  pumpkinTemplate = gltf.scene;
  pumpkinTemplate.scale.setScalar(1.2);
  // Swap existing pumpkin markers for new template clones
  rebuildHandMarkers('Right');
  // Ensure all existing clones have the correct scale
  handData.Right.markers.forEach(m => m.scale.setScalar(1.2));
  console.log('pumpkin.glb loaded');
}, undefined, () => {
  console.warn('pumpkin.glb not found — using fallback icosahedron');
});

// ================================================================
//  HAND MARKER SYSTEM
// ================================================================

// Per-hand data: { markers: [...21 meshes], lines: [...connections], positions: [...Vector3] }
const handData = {
  Left:  { markers: [], lines: [], positions: null },
  Right: { markers: [], lines: [], positions: null },
};

function createHandMarkers(template, count) {
  const markers = [];
  for (let i = 0; i < count; i++) {
    const clone = template.clone(true);
    clone.visible = false;
    scene.add(clone);
    markers.push(clone);
  }
  return markers;
}

function createHandLines(lineColor, count) {
  const lines = [];
  HAND_CONNECTIONS.forEach(([a, b]) => {
    const pts = [new THREE.Vector3(), new THREE.Vector3()];
    const geo  = new THREE.BufferGeometry().setFromPoints(pts);
    const mat  = new THREE.LineBasicMaterial({ color: lineColor, transparent: true, opacity: 0.65 });
    const line = new THREE.Line(geo, mat);
    line.visible = false;
    scene.add(line);
    lines.push({ line, a, b });
  });
  return lines;
}

function disposeHandData(label) {
  const d = handData[label];
  d.markers.forEach(m => scene.remove(m));
  d.lines.forEach(({ line }) => scene.remove(line));
  d.markers = [];
  d.lines   = [];
  d.positions = null;
}

function rebuildHandMarkers(label) {
  disposeHandData(label);
  const template  = label === 'Left' ? skullTemplate : pumpkinTemplate;
  const lineColor = label === 'Left' ? COLOR_SKULL : COLOR_PUMPKIN;
  handData[label].markers = createHandMarkers(template, 21);
  handData[label].lines   = createHandLines(lineColor, HAND_CONNECTIONS.length);
}

// Initialise both hands with fallback templates
rebuildHandMarkers('Left');
rebuildHandMarkers('Right');

// ── Position update ───────────────────────────────────────────────
function updateHandMeshes(label, landmarks) {
  const d = handData[label];
  d.positions = landmarks.map(lm => new THREE.Vector3(
    (lm.x - 0.5) * 6,
    -(lm.y - 0.5) * 6,
    -lm.z * 3
  ));
  for (let i = 0; i < 21; i++) {
    d.markers[i].position.copy(d.positions[i]);
    d.markers[i].visible = true;
  }
  d.lines.forEach(({ line, a, b }) => {
    const pos = line.geometry.attributes.position;
    const pa = d.positions[a], pb = d.positions[b];
    pos.setXYZ(0, pa.x, pa.y, pa.z);
    pos.setXYZ(1, pb.x, pb.y, pb.z);
    pos.needsUpdate = true;
    line.visible = true;
  });
}

function hideHandMeshes(label) {
  const d = handData[label];
  d.markers.forEach(m => { m.visible = false; });
  d.lines.forEach(({ line }) => { line.visible = false; });
  d.positions = null;
}

// ================================================================
//  RENDER LOOP
// ================================================================

const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const camLabel   = document.getElementById('cam-label');
const handCountEl = document.getElementById('hand-count');
const fpsEl      = document.getElementById('fps-display');
const leftLabel  = document.getElementById('left-label');
const rightLabel = document.getElementById('right-label');

let lastTime = performance.now();
let fpsBuf   = [];
let frame    = 0;
let pulseT   = 0;

let activeHands = 0;

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.1);
  lastTime  = now;

  // FPS sampling
  fpsBuf.push(1 / dt);
  if (fpsBuf.length > 30) fpsBuf.shift();
  if (++frame % 15 === 0) {
    fpsEl.textContent = Math.round(fpsBuf.reduce((a, b) => a + b, 0) / fpsBuf.length);
    handCountEl.textContent = activeHands + ' / 2';
  }

  // Pulse scale for markers
  pulseT += dt * 2.2;
  const pulse = 0.55 + 0.45 * Math.sin(pulseT);

  ['Left', 'Right'].forEach(label => {
    const d = handData[label];
    if (d.positions) {
      d.markers.forEach(m => {
        m.scale.setScalar(1.2 * (0.88 + 0.12 * pulse));
      });
    }
  });

  // Dynamic accent lights fade in/out
  const targetSkull   = handData.Left.positions  ? 2.5 : 0;
  const targetPumpkin = handData.Right.positions ? 2.8 : 0;
  skullLight.intensity   += (targetSkull   - skullLight.intensity)   * 0.06;
  pumpkinLight.intensity += (targetPumpkin - pumpkinLight.intensity) * 0.06;

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================================================================
//  HUD UPDATES
// ================================================================

function updateHUD() {
  const leftActive  = handData.Left.positions  !== null;
  const rightActive = handData.Right.positions !== null;
  activeHands = (leftActive ? 1 : 0) + (rightActive ? 1 : 0);

  const anyActive = leftActive || rightActive;
  statusDot.classList.toggle('active', anyActive);

  if (!anyActive) {
    statusText.textContent = 'NO HANDS DETECTED';
    camLabel.textContent   = 'NO HANDS DETECTED';
    camLabel.classList.remove('active');
  } else if (leftActive && rightActive) {
    statusText.textContent = 'BOTH HANDS TRACKED';
    camLabel.textContent   = 'BOTH HANDS TRACKED';
    camLabel.classList.add('active');
  } else if (leftActive) {
    statusText.textContent = 'LEFT HAND TRACKED';
    camLabel.textContent   = 'LEFT HAND TRACKED';
    camLabel.classList.add('active');
  } else {
    statusText.textContent = 'RIGHT HAND TRACKED';
    camLabel.textContent   = 'RIGHT HAND TRACKED';
    camLabel.classList.add('active');
  }

  // Legend highlights
  leftLabel.className  = 'hand-label skull'   + (leftActive  ? ' active-skull'   : '');
  rightLabel.className = 'hand-label pumpkin' + (rightActive ? ' active-pumpkin' : '');
}

// ================================================================
//  MEDIAPIPE HANDS
// ================================================================

const videoEl  = document.getElementById('webcam');
const lmCanvas = document.getElementById('landmark-canvas');
const lmCtx    = lmCanvas.getContext('2d');

function sizePreviewCanvas() {
  const el = document.getElementById('camera-preview');
  lmCanvas.width  = el.offsetWidth;
  lmCanvas.height = el.offsetHeight;
}
sizePreviewCanvas();
window.addEventListener('resize', sizePreviewCanvas);

function drawPreviewHand(landmarks, lineColor, dotColor) {
  const W = lmCanvas.width, H = lmCanvas.height;
  // Connections
  HAND_CONNECTIONS.forEach(([a, b]) => {
    const la = landmarks[a], lb = landmarks[b];
    lmCtx.strokeStyle = lineColor;
    lmCtx.lineWidth   = 1;
    lmCtx.globalAlpha = 0.65;
    lmCtx.beginPath();
    lmCtx.moveTo(la.x * W, la.y * H);
    lmCtx.lineTo(lb.x * W, lb.y * H);
    lmCtx.stroke();
  });
  // Joints
  landmarks.forEach((lm, i) => {
    lmCtx.globalAlpha = 1;
    lmCtx.fillStyle   = dotColor;
    lmCtx.shadowColor = dotColor;
    lmCtx.shadowBlur  = 6;
    lmCtx.beginPath();
    lmCtx.arc(lm.x * W, lm.y * H, i === 0 ? 4 : 3, 0, Math.PI * 2);
    lmCtx.fill();
    lmCtx.shadowBlur = 0;
  });
  lmCtx.globalAlpha = 1;
}

// Init MediaPipe Hands — TWO hands
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence:  0.5,
});

hands.onResults(results => {
  lmCtx.clearRect(0, 0, lmCanvas.width, lmCanvas.height);

  // Reset both hands; selectively show those detected
  hideHandMeshes('Left');
  hideHandMeshes('Right');

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    results.multiHandLandmarks.forEach((lm, i) => {
      // MediaPipe reports handedness from the camera's perspective (mirrored for a
      // front-facing / selfie camera).  "Left" from the model means the hand is on
      // the LEFT of the raw video feed, which is the user's RIGHT hand — and vice
      // versa.  Flip the label so skull = user's left hand, pumpkin = user's right.
      const mpLabel = results.multiHandedness[i].label; // "Left" or "Right" (camera POV)
      const label   = mpLabel === 'Left' ? 'Right' : 'Left'; // flip to user POV
      updateHandMeshes(label, lm);

      const lineCol = label === 'Left' ? PREVIEW_SKULL : PREVIEW_PUMPKIN;
      drawPreviewHand(lm, lineCol, lineCol);
    });
  }

  updateHUD();
});

// Start webcam via MediaPipe Camera
const mpCamera = new Camera(videoEl, {
  onFrame: async () => { await hands.send({ image: videoEl }); },
  width:  640,
  height: 480,
});
mpCamera.start().catch(err => {
  console.warn('Camera error:', err);
  statusText.textContent = 'CAMERA UNAVAILABLE';
});
</script>
</body>
</html>
